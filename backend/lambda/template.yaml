AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Presently FastAPI Application with Mangum

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  NeonDatabaseURL:
    Type: String
    Description: Neon Postgres connection string
    NoEcho: true
  SenderEmail:
    Type: String
    Description: Email address to send invitations from (must be verified in SES)
    Default: ""
  FrontendURL:
    Type: String
    Description: Frontend URL for invitation links
    Default: "https://presently-nu.vercel.app"

Resources:
  # ============================================================================
  # Main FastAPI Lambda Function
  # ============================================================================

  PresentlyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub presently-api-${Environment}
      CodeUri: ./
      Handler: main.handler  # Mangum handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 512
      Role: !Sub '{{resolve:ssm:/${Environment}/LambdaRole}}'
      Environment:
        Variables:
          DATABASE_URL: !Ref NeonDatabaseURL
          PHOTOS_BUCKET: !Sub '{{resolve:ssm:/${Environment}/PhotosBucket}}'
          PHOTOS_CDN: !Sub '{{resolve:ssm:/${Environment}/PhotosCDN}}'
          COGNITO_USER_POOL_ID: !Sub '{{resolve:ssm:/${Environment}/UserPoolId}}'
          COGNITO_CLIENT_ID: !Sub '{{resolve:ssm:/${Environment}/UserPoolClientId}}'
          ENVIRONMENT: !Ref Environment
          SENDER_EMAIL: !Ref SenderEmail
          FRONTEND_URL: !Ref FrontendURL
      Events:
        # Catch-all proxy route for FastAPI (handles all paths including /)
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PresentlyHttpApi
            Path: /{proxy+}
            Method: ANY
        # Root path needs separate event
        RootApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PresentlyHttpApi
            Path: /
            Method: ANY
    Metadata:
      BuildMethod: python3.12

  # ============================================================================
  # HTTP API Gateway (simpler than REST API, works great with FastAPI)
  # ============================================================================

  PresentlyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'  # TODO: Restrict to your domain in production
        AllowHeaders:
          - '*'
        AllowMethods:
          - '*'
        AllowCredentials: false
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              Audience:
                - !Sub '{{resolve:ssm:/${Environment}/UserPoolClientId}}'
              Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/{{resolve:ssm:/${Environment}/UserPoolId}}'

  # ============================================================================
  # Cognito Trigger Functions (keep separate from FastAPI)
  # ============================================================================

  CognitoPreSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub presently-cognito-pre-signup-${Environment}
      CodeUri: ./
      Handler: handlers.cognito_triggers.pre_signup_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 256
      Role: !Sub '{{resolve:ssm:/${Environment}/LambdaRole}}'

  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub presently-cognito-post-confirmation-${Environment}
      CodeUri: ./
      Handler: handlers.cognito_triggers.post_confirmation_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 256
      Role: !Sub '{{resolve:ssm:/${Environment}/LambdaRole}}'
      Environment:
        Variables:
          DATABASE_URL: !Ref NeonDatabaseURL

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub 'https://${PresentlyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub ${Environment}-ApiUrl

  ApiId:
    Description: API Gateway ID
    Value: !Ref PresentlyHttpApi
    Export:
      Name: !Sub ${Environment}-ApiId

  FunctionArn:
    Description: FastAPI Lambda Function ARN
    Value: !GetAtt PresentlyApiFunction.Arn
    Export:
      Name: !Sub ${Environment}-FunctionArn

  PreSignupFunctionArn:
    Description: Pre-signup trigger function ARN
    Value: !GetAtt CognitoPreSignupFunction.Arn
    Export:
      Name: !Sub ${Environment}-PreSignupFunctionArn

  PostConfirmationFunctionArn:
    Description: Post-confirmation trigger function ARN
    Value: !GetAtt CognitoPostConfirmationFunction.Arn
    Export:
      Name: !Sub ${Environment}-PostConfirmationFunctionArn
