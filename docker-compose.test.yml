version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: presently-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: presently_test
    ports:
      - "5433:5432"  # Use different port to avoid conflicts
    volumes:
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d presently_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # Use tmpfs for faster tests (data not persisted)
