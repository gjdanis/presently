version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: presently-db
    environment:
      POSTGRES_USER: presently
      POSTGRES_PASSWORD: presently_local
      POSTGRES_DB: presently_local
    ports:
      - "5433:5432"
    volumes:
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - presently_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presently -d presently_local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  presently_data:
