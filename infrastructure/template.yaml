AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Presently - Complete Infrastructure (Cognito, S3, Lambda, API Gateway)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name (dev or prod)

  NeonDatabaseURL:
    Type: String
    Description: Neon Postgres connection string
    NoEcho: true

  FrontendURL:
    Type: String
    Description: Frontend URL for invitation links
    Default: "https://presently-nu.vercel.app"

  GitCommit:
    Type: String
    Description: Git commit SHA for the deployed version
    Default: "unknown"

  GitHubToken:
    Type: String
    Description: GitHub fine-grained PAT with issues:write permission
    NoEcho: true
    Default: ""

  GitHubRepo:
    Type: String
    Description: GitHub repo slug (e.g. georgejdanis/presently)
    Default: ""

  LambdaCodeUri:
    Type: String
    Description: Path to Lambda code directory
    Default: "../backend/lambda"

Resources:
  # ============================================================================
  # Cognito User Pool
  # ============================================================================

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub presently-${Environment}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: name
          Required: true
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email
      LambdaConfig:
        PostConfirmation: !GetAtt CognitoPostConfirmationFunction.Arn
        PreSignUp: !GetAtt CognitoPreSignupFunction.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub presently-web-${Environment}
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      ReadAttributes:
        - email
        - name
      WriteAttributes:
        - email
        - name

  # ============================================================================
  # S3 Bucket for Photos
  # ============================================================================

  PhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub presently-photos-${Environment}-${AWS::Region}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'  # TODO: Restrict to your domain in production
            AllowedMethods:
              - PUT
              - POST
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # ============================================================================
  # CloudFront Distribution for Photos (CDN)
  # ============================================================================

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub OAI for presently-photos-${Environment}

  PhotosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PhotosBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOAI}
            Action: s3:GetObject
            Resource: !Sub ${PhotosBucket.Arn}/*

  PhotosCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub Presently Photos CDN - ${Environment}
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PhotosBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
          DefaultTTL: 86400      # 1 day
          MaxTTL: 31536000       # 1 year
          MinTTL: 0
        PriceClass: PriceClass_100  # Use only North America and Europe
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # ============================================================================
  # Lambda Execution Role
  # ============================================================================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub presently-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub '${PhotosBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt PhotosBucket.Arn

  # ============================================================================
  # HTTP API Gateway
  # ============================================================================

  PresentlyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'  # TODO: Restrict to your domain in production
        AllowHeaders:
          - '*'
        AllowMethods:
          - '*'
        AllowCredentials: false
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              Audience:
                - !Ref UserPoolClient
              Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'

  # ============================================================================
  # Main FastAPI Lambda Function
  # ============================================================================

  PresentlyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub presently-api-${Environment}
      CodeUri: !Ref LambdaCodeUri
      Handler: main.handler  # Mangum handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DATABASE_URL: !Ref NeonDatabaseURL
          PHOTOS_BUCKET: !Ref PhotosBucket
          PHOTOS_CDN: !GetAtt PhotosCDN.DomainName
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          ENVIRONMENT: !Ref Environment
          FRONTEND_URL: !Ref FrontendURL
          GIT_COMMIT: !Ref GitCommit
          GITHUB_TOKEN: !Ref GitHubToken
          GITHUB_REPO: !Ref GitHubRepo
      Events:
        # Catch-all proxy route for FastAPI (handles all paths including /)
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PresentlyHttpApi
            Path: /{proxy+}
            Method: ANY
        # Root path needs separate event
        RootApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PresentlyHttpApi
            Path: /
            Method: ANY
    Metadata:
      BuildMethod: python3.12

  # ============================================================================
  # Cognito Trigger Functions
  # ============================================================================

  CognitoPreSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub presently-cognito-pre-signup-${Environment}
      CodeUri: !Ref LambdaCodeUri
      Handler: handlers.cognito_triggers.pre_signup_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DATABASE_URL: !Ref NeonDatabaseURL

  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub presently-cognito-post-confirmation-${Environment}
      CodeUri: !Ref LambdaCodeUri
      Handler: handlers.cognito_triggers.post_confirmation_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DATABASE_URL: !Ref NeonDatabaseURL

  # Lambda permissions for Cognito to invoke trigger functions
  PreSignupLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CognitoPreSignupFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  PostConfirmationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CognitoPostConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

# ============================================================================
# Outputs
# ============================================================================

Outputs:
  # Cognito
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub ${Environment}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${Environment}-UserPoolClientId

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub ${Environment}-UserPoolArn

  # S3 & CloudFront
  PhotosBucketName:
    Description: S3 Bucket for Photos
    Value: !Ref PhotosBucket
    Export:
      Name: !Sub ${Environment}-PhotosBucket

  PhotosCDNDomain:
    Description: CloudFront CDN Domain for Photos
    Value: !GetAtt PhotosCDN.DomainName
    Export:
      Name: !Sub ${Environment}-PhotosCDN

  # IAM
  LambdaRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub ${Environment}-LambdaRole

  # API Gateway
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub 'https://${PresentlyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub ${Environment}-ApiUrl

  ApiId:
    Description: API Gateway ID
    Value: !Ref PresentlyHttpApi
    Export:
      Name: !Sub ${Environment}-ApiId

  # Lambda Functions
  FunctionArn:
    Description: FastAPI Lambda Function ARN
    Value: !GetAtt PresentlyApiFunction.Arn
    Export:
      Name: !Sub ${Environment}-FunctionArn

  PreSignupFunctionArn:
    Description: Pre-signup trigger function ARN
    Value: !GetAtt CognitoPreSignupFunction.Arn
    Export:
      Name: !Sub ${Environment}-PreSignupFunctionArn

  PostConfirmationFunctionArn:
    Description: Post-confirmation trigger function ARN
    Value: !GetAtt CognitoPostConfirmationFunction.Arn
    Export:
      Name: !Sub ${Environment}-PostConfirmationFunctionArn

  # General
  Region:
    Description: AWS Region
    Value: !Ref AWS::Region
    Export:
      Name: !Sub ${Environment}-Region
